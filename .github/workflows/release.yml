name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Build Release Package
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "VPN Manager - Release Build v$VERSION" -ForegroundColor Cyan
          Write-Host "========================================`n" -ForegroundColor Cyan
          
          # Step 1: Clean
          Write-Host "[1/6] Cleaning previous builds..." -ForegroundColor Yellow
          dotnet clean VPNManager/VPNManager.csproj -c Release -v minimal
          
          # Step 2: Build
          Write-Host "`n[2/6] Building Release configuration..." -ForegroundColor Yellow
          dotnet publish VPNManager/VPNManager.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$VERSION
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[ERROR] Build failed!" -ForegroundColor Red
            exit 1
          }
          
          # Step 3: Create release package
          Write-Host "`n[3/6] Creating release package..." -ForegroundColor Yellow
          
          $SOURCE_DIR = "VPNManager/bin/Release/net10.0-windows/win-x64/publish"
          $RELEASE_DIR = "Release-Package"
          
          # Clean and create release directory
          if (Test-Path $RELEASE_DIR) {
            Remove-Item -Recurse -Force $RELEASE_DIR
          }
          New-Item -ItemType Directory -Path $RELEASE_DIR | Out-Null
          
          # Copy application files
          Write-Host "Copying application files..." -ForegroundColor Gray
          Copy-Item -Path "$SOURCE_DIR\*" -Destination "$RELEASE_DIR\" -Recurse -Force
          
          # Copy required files
          Write-Host "Copying PowerShell script and documentation..." -ForegroundColor Gray
          Copy-Item -Path "VPN-AutoToggle.ps1" -Destination "$RELEASE_DIR\" -Force
          Copy-Item -Path "README.md" -Destination "$RELEASE_DIR\" -Force
          
          # Copy optional documentation if exists
          if (Test-Path "INSTALL.md") { Copy-Item -Path "INSTALL.md" -Destination "$RELEASE_DIR\" -Force }
          if (Test-Path "WARP.md") { Copy-Item -Path "WARP.md" -Destination "$RELEASE_DIR\" -Force }
          if (Test-Path "CLOUDFLARE_WARP_GUIDE.md") { Copy-Item -Path "CLOUDFLARE_WARP_GUIDE.md" -Destination "$RELEASE_DIR\" -Force }
          if (Test-Path "CHANGELOG.md") { Copy-Item -Path "CHANGELOG.md" -Destination "$RELEASE_DIR\" -Force }
          
          # Create user guide
          Write-Host "Creating user guide..." -ForegroundColor Gray
          $lines = @(
            "Mega Download Enhancer - Quick Start",
            "=====================================",
            "",
            "1. Install Cloudflare WARP: https://1.1.1.1/",
            "2. Run VPNManager.exe",
            "3. Open Settings -> select CloudflareWARP",
            "4. Set cycle duration (6 min recommended for MEGA)",
            "5. Click Start Cycle",
            "",
            "The app minimizes to tray and cycles your IP automatically.",
            "MEGAsync restarts on each toggle so MEGA sees a fresh session.",
            "",
            "Version: $VERSION  |  Built: $(Get-Date -Format 'yyyy-MM-dd')",
            "Docs: https://github.com/${{ github.repository }}"
          )
          $lines | Out-File -FilePath "$RELEASE_DIR\QUICKSTART.txt" -Encoding UTF8
          
          # Step 4: Create ZIP archive
          Write-Host "`n[4/6] Creating ZIP archive..." -ForegroundColor Yellow
          $ZIP_NAME = "VPNManager-v$VERSION-win-x64.zip"
          
          if (Test-Path $ZIP_NAME) {
            Remove-Item -Force $ZIP_NAME
          }
          
          Compress-Archive -Path "$RELEASE_DIR\*" -DestinationPath $ZIP_NAME -CompressionLevel Optimal
          
          # Step 5: Calculate checksum
          Write-Host "`n[5/6] Calculating checksum..." -ForegroundColor Yellow
          $checksum = (Get-FileHash -Path $ZIP_NAME -Algorithm SHA256).Hash
          $checksum | Out-File -FilePath "checksum.txt" -Encoding UTF8
          
          Write-Host "`nSHA256: $checksum" -ForegroundColor Green
          
          # Step 6: Create release notes
          Write-Host "`n[6/6] Preparing release notes..." -ForegroundColor Yellow
          
          # Save outputs
          echo "ZIP_FILE=$ZIP_NAME" >> $env:GITHUB_OUTPUT
          echo "CHECKSUM=$checksum" >> $env:GITHUB_OUTPUT
          
          Write-Host "`n========================================" -ForegroundColor Cyan
          Write-Host "Release Package Created Successfully!" -ForegroundColor Green
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Version: v$VERSION" -ForegroundColor White
          Write-Host "Package: $ZIP_NAME" -ForegroundColor White
          Write-Host "SHA256: $checksum" -ForegroundColor White
        
      - name: Generate Release Notes
        id: release_notes
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $CHECKSUM = Get-Content checksum.txt
          $DATE = Get-Date -Format "yyyy-MM-dd"
          $REPO = "${{ github.repository }}"

          $lines = @(
            "## Mega Download Enhancer v$VERSION",
            "",
            "Automatically cycles your VPN/IP to bypass MEGA bandwidth limits and keep MEGAsync downloading at full speed.",
            "",
            "### Installation",
            "1. Download ``VPNManager-v$VERSION-win-x64.zip``",
            "2. Extract anywhere — no installer needed",
            "3. Run ``VPNManager.exe``",
            "4. Select CloudflareWARP, set 6-min cycle, click **Start Cycle**",
            "",
            "### Requirements",
            "- Windows 10 or 11",
            "- [Cloudflare WARP](https://1.1.1.1/) (free)",
            "- MEGAsync desktop client",
            "- No .NET install needed (self-contained build)",
            "",
            "### SHA256 Checksum",
            "``````",
            "$CHECKSUM",
            "``````",
            "",
            "Verify: ``Get-FileHash VPNManager-v$VERSION-win-x64.zip -Algorithm SHA256``",
            "",
            "---",
            "Built $DATE with GitHub Actions"
          )

          $notes = $lines -join "`n"
          $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding UTF8

          $delimiter = "EOF_DELIMITER_$(Get-Random)"
          echo "NOTES<<$delimiter" >> $env:GITHUB_OUTPUT
          echo "$notes" >> $env:GITHUB_OUTPUT
          echo "$delimiter" >> $env:GITHUB_OUTPUT
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: VPN Manager v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          files: |
            VPNManager-v${{ steps.version.outputs.VERSION }}-win-x64.zip
            checksum.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VPNManager-v${{ steps.version.outputs.VERSION }}-Release
          path: |
            VPNManager-v${{ steps.version.outputs.VERSION }}-win-x64.zip
            checksum.txt
            Release-Package/
          retention-days: 90
